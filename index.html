<!doctype html><html lang="fr"><head><meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/><meta name="theme-color" content="#0f6bff"/><link rel="manifest" href="manifest.json"/><title>DrawHunter</title><link rel="stylesheet" href="style.css"/></head><body><main class="app">
<header class="hero"><div><p class="eyebrow">⚽ DrawHunter v3</p><h1>Draw Index Pro</h1><p>Moteur gratuit GitHub Pages : historique API-Sports, indice explicatif, value après cote.</p></div><button id="refreshBtn">Actualiser</button></header>
<section class="panel"><h2>Paramètres</h2><div class="grid"><label>Marché<select id="market"><option value="draw">Match nul</option><option value="double_chance">Double chance</option></select></label><label>Edge minimum<input id="minEdge" type="number" step="0.01" value="0.05"></label><label>Draw Index mini<input id="minIndex" type="number" step="1" value="55"></label><label>Période<select id="period"><option value="2" selected>Aujourd’hui + demain</option><option value="1">Aujourd’hui</option><option value="3">3 jours</option><option value="7">7 jours</option><option value="all">Tout</option></select></label><label>Affichage<select id="filterMode"><option value="todo" selected>À analyser</option><option value="value">Value seulement</option><option value="candidates">Candidats + value</option><option value="all">Tous les matchs</option><option value="hidden">Sans cote bookmaker</option></select></label></div></section>
<section class="stats"><div><span>Matchs</span><b id="statMatches">—</b></div><div><span>À analyser</span><b id="statTodo">—</b></div><div><span>Candidats</span><b id="statCandidates">—</b></div><div><span>Value</span><b id="statValue">—</b></div><div><span>Maj</span><b id="statUpdated">—</b></div></section>
<section class="panel"><div class="row"><h2>Matchs</h2><button class="secondary" id="exportBtn">Exporter CSV</button></div><p class="hint">Le match reste visible pendant la saisie. “Pas de cote bookmaker” le masque de la liste à analyser.</p><div id="cards"></div></section>
</main><script src="app.js"></script></body></html>
