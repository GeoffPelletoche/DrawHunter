name: Update DrawHunter football data
on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * *"
permissions:
  contents: write
jobs:
  update-football:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - name: Fetch football data
        env:
          API_FOOTBALL_KEY: ${{ secrets.API_FOOTBALL_KEY }}
          API_FOOTBALL_HOST: v3.football.api-sports.io
        run: python scripts/update_football_data.py
      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update DrawHunter v3 data"
          file_pattern: data/drawhunter-data.json
